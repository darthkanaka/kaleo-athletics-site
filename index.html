<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Kaleo Lopez Athletics · Coming Soon</title>
<meta name="description" content="Kaleo Lopez Athletics. Central Oahu. Coming soon.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#127944;</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600;700&family=Source+Sans+3:wght@400;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF8F3; --ink:#171A1F; --cobalt:#2151E0; --cobalt-deep:#1B3FB0; --coral:#FF5C39;
    --mut:#5F6368; --soft:#8A857A; --line:#EAE5DA;
    --disp:"Barlow Semi Condensed","Arial Narrow","Helvetica Neue",sans-serif;
    --body:"Source Sans 3",-apple-system,"Segoe UI",sans-serif;
    --mono:"IBM Plex Mono","SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0; min-height:100svh; display:flex; flex-direction:column; background:
    radial-gradient(110% 85% at 90% 0%, rgba(33,81,224,.11), transparent 55%),
    radial-gradient(70% 55% at 5% 100%, rgba(255,92,57,.09), transparent 60%),
    var(--paper);
    color:var(--ink); font-family:var(--body); line-height:1.55}
  main{flex:1; display:flex; align-items:center; justify-content:center; padding:32px 20px}
  .card{max-width:520px; width:100%; text-align:center}
  .eyebrow{font-family:var(--mono); font-size:11px; color:var(--cobalt-deep); letter-spacing:.2em; margin:0 0 20px}
  h1{font-family:var(--disp); font-weight:700; font-size:clamp(38px,9vw,60px); line-height:1.0; margin:0 0 14px; text-transform:uppercase}
  h1 em{font-style:normal; color:var(--cobalt)}
  .sub{color:var(--mut); font-size:16px; margin:0 0 34px}
  form{display:flex; gap:10px; max-width:380px; margin:0 auto}
  input{flex:1; padding:14px 16px; border-radius:8px; border:1.5px solid #C9C4B8; font-size:15px; font-family:var(--body); background:#fff; color:var(--ink)}
  input:focus{outline:2px solid var(--cobalt); border-color:transparent}
  button{padding:14px 22px; border:0; border-radius:8px; background:var(--cobalt); color:#fff; font-weight:600; font-size:15px; cursor:pointer; font-family:var(--body); transition:transform .2s ease}
  button:hover{transform:translateY(-2px)}
  .msg{font-size:13.5px; color:var(--coral); min-height:20px; margin:12px 0 0}
  .foot{text-align:center; padding:22px 16px; color:var(--soft); font-family:var(--mono); font-size:11px; letter-spacing:.08em}
  @media (max-width:480px){ form{flex-direction:column} button{width:100%} }
  @media (prefers-reduced-motion: reduce){ button:hover{transform:none} }
</style>
</head>
<body>
<main>
  <div class="card">
    <p class="eyebrow">CENTRAL OAHU</p>
    <h1>Kaleo Lopez<br><em>Athletics</em></h1>
    <p class="sub">Something's coming. Train. Recover. Advance.</p>
    <form id="gate" autocomplete="off">
      <input id="pw" type="password" placeholder="Password" aria-label="Password" autofocus>
      <button type="submit">Enter</button>
    </form>
    <p class="msg" id="msg"></p>
  </div>
</main>
<footer class="foot">KALEO LOPEZ ATHLETICS LLC</footer>
<script>
(function(){
  var HASH = '0ffe1abd1a08215353c233d6e009613e95eec4253832a761af28ff37ac5a150c';
  if (sessionStorage.getItem('kla-gate') === 'open') { location.replace('home.html'); return; }
  var form = document.getElementById('gate');
  var msg = document.getElementById('msg');
  form.addEventListener('submit', function(e){
    e.preventDefault();
    var v = document.getElementById('pw').value.trim().toLowerCase();
    if (!v) return;
    crypto.subtle.digest('SHA-256', new TextEncoder().encode(v)).then(function(buf){
      var hex = Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
      if (hex === HASH) {
        sessionStorage.setItem('kla-gate','open');
        location.href = 'home.html';
      } else {
        msg.textContent = 'Not it. Ask Kawika or Kaleo for the password.';
      }
    });
  });
})();
</script>
</body>
</html>
