<!DOCTYPE html>

<head>

<style>
  :root{
    --paper:#FAF8F3; --ink:#171A1F; --cobalt:#2151E0; --cobalt-deep:#1B3FB0; --coral:#FF5C39;
    --mut:#5F6368; --soft:#8A857A; --line:#EAE5DA;
    --disp:"Barlow Semi Condensed","Arial Narrow","Helvetica Neue",sans-serif;
    --body:"Source Sans 3",-apple-system,"Segoe UI",sans-serif;
    --mono:"IBM Plex Mono","SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0; min-height:100svh; display:flex; flex-direction:column; background:
    radial-gradient(110% 85% at 90% 0%, rgba(33,81,224,.11), transparent 55%),
    radial-gradient(70% 55% at 5% 100%, rgba(255,92,57,.09), transparent 60%),
    var(--paper);
    color:var(--ink); font-family:var(--body); line-height:1.55}
  main{flex:1; display:flex; align-items:center; justify-content:center; padding:32px 20px}
  .card{max-width:520px; width:100%; text-align:center}
  .eyebrow{font-family:var(--mono); font-size:11px; color:var(--cobalt-deep); letter-spacing:.2em; margin:0 0 20px}
  h1{font-family:var(--disp); font-weight:700; font-size:clamp(38px,9vw,60px); line-height:1.0; margin:0 0 14px; text-transform:uppercase}
  h1 em{font-style:normal; color:var(--cobalt)}
  .sub{color:var(--mut); font-size:16px; margin:0 0 34px}
  form{display:flex; gap:10px; max-width:380px; margin:0 auto}
  input{flex:1; padding:14px 16px; border-radius:8px; border:1.5px solid #C9C4B8; font-size:15px; font-family:var(--body); background:#fff; color:var(--ink)}
  input:focus{outline:2px solid var(--cobalt); border-color:transparent}
  button{padding:14px 22px; border:0; border-radius:8px; background:var(--cobalt); color:#fff; font-weight:600; font-size:15px; cursor:pointer; font-family:var(--body); transition:transform .2s ease}
  button:hover{transform:translateY(-2px)}
  .msg{font-size:13.5px; color:var(--coral); min-height:20px; margin:12px 0 0}
  .foot{text-align:center; padding:22px 16px; color:var(--soft); font-family:var(--mono); font-size:11px; letter-spacing:.08em}
  @media (max-width:480px){ form{flex-direction:column} button{width:100%} }
  @media (prefers-reduced-motion: reduce){ button:hover{transform:none} }
</style>
</head>
<body>
<main>
  <div class="card">
    <p class="eyebrow">CENTRAL OAHU</p>
    <h1>Kaleo Lopez<br><em>Athletics</em></h1>
    <p class="sub">Something's coming. Train. Recover. Advance.</p>
    <form id="gate" autocomplete="off">
      <input id="pw" type="password" placeholder="Password" aria-label="Password" autofocus>
      <button type="submit">Enter</button>
    </form>
    <p class="msg" id="msg"></p>
  </div>
</main>
<footer class="foot">KALEO LOPEZ ATHLETICS LLC</footer>
<script>
// Self-contained SHA-256 so the gate works over plain HTTP too (window.crypto.subtle
// is unavailable on non-secure origins). Casual privacy for a preview, not real security.
function sha256(ascii){
  function rr(v,a){return (v>>>a)|(v<<(32-a));}
  var K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
    0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
    0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
    0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
    0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
    0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
    0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
    0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
  var hh=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
  var bytes=[],i,j,a,b,c,d,e,f,g,H,t1,t2,s0,s1,ch,maj,w=[];
  for(i=0;i<ascii.length;i++){
    var cc=ascii.charCodeAt(i);
    if(cc<128){bytes.push(cc);}
    else if(cc<2048){bytes.push(192|(cc>>6),128|(cc&63));}
    else{bytes.push(224|(cc>>12),128|((cc>>6)&63),128|(cc&63));}
  }
  var bitLen=bytes.length*8;
  bytes.push(0x80);
  while(bytes.length%64!==56)bytes.push(0);
  for(i=7;i>=0;i--)bytes.push((bitLen/Math.pow(2,i*8))&255);
  for(var off=0;off<bytes.length;off+=64){
    for(i=0;i<16;i++){
      w[i]=(bytes[off+i*4]<<24)|(bytes[off+i*4+1]<<16)|(bytes[off+i*4+2]<<8)|(bytes[off+i*4+3]);
    }
    for(i=16;i<64;i++){
      var x=w[i-15],y=w[i-2];
      s0=rr(x,7)^rr(x,18)^(x>>>3);
      s1=rr(y,17)^rr(y,19)^(y>>>10);
      w[i]=(w[i-16]+s0+w[i-7]+s1)|0;
    }
    a=hh[0];b=hh[1];c=hh[2];d=hh[3];e=hh[4];f=hh[5];g=hh[6];H=hh[7];
    for(i=0;i<64;i++){
      s1=rr(e,6)^rr(e,11)^rr(e,25);
      ch=(e&f)^(~e&g);
      t1=(H+s1+ch+K[i]+w[i])|0;
      s0=rr(a,2)^rr(a,13)^rr(a,22);
      maj=(a&b)^(a&c)^(b&c);
      t2=(s0+maj)|0;
      H=g;g=f;f=e;e=(d+t1)|0;d=c;c=b;b=a;a=(t1+t2)|0;
    }
    hh[0]=(hh[0]+a)|0;hh[1]=(hh[1]+b)|0;hh[2]=(hh[2]+c)|0;hh[3]=(hh[3]+d)|0;
    hh[4]=(hh[4]+e)|0;hh[5]=(hh[5]+f)|0;hh[6]=(hh[6]+g)|0;hh[7]=(hh[7]+H)|0;
  }
  var result='';
  for(i=0;i<8;i++){
    for(j=7;j>=0;j--){result+=((hh[i]>>>(j*4))&15).toString(16);}
  }
  return result;
}
(function(){
  var HASH = '0ffe1abd1a08215353c233d6e009613e95eec4253832a761af28ff37ac5a150c';
  if (sessionStorage.getItem('kla-gate') === 'open') { location.replace('home.html'); return; }
  var form = document.getElementById('gate');
  var msg = document.getElementById('msg');
  form.addEventListener('submit', function(e){
    e.preventDefault();
    var v = document.getElementById('pw').value.trim().toLowerCase();
    if (!v) return;
    if (sha256(v) === HASH) {
      sessionStorage.setItem('kla-gate','open');
      location.href = 'home.html';
    } else {
      msg.textContent = 'Not it. Ask Kawika or Kaleo for the password.';
    }
  });
})();
</script>
